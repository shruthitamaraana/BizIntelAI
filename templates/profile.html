<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | BizIntel AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
            --nav-height: 75px;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--bg-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        /* --- SYNCHRONIZED NAVBAR --- */
        .top-nav {
            height: var(--nav-height);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .nav-brand { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: #000; }
        .nav-links { display: flex; gap: 30px; margin-left: 50px; }
        .nav-link-item { text-decoration: none; color: #64748b; font-weight: 600; font-size: 0.95rem; transition: 0.2s; }
        .nav-link-item:hover, .nav-link-item.active { color: var(--primary-blue); }

        .content-wrapper {
            margin-top: var(--nav-height);
            padding: 60px 40px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding: 40px;
            color: white;
            text-align: center;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border: 4px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 auto 15px;
            text-transform: uppercase;
        }

        .form-label {
            font-weight: 700;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .skill-tag {
            background: #eff6ff;
            color: var(--primary-blue);
            padding: 6px 15px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-block;
            margin: 0 5px 5px 0;
        }

        .btn-save {
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            background: var(--primary-blue);
            color: white;
            border: none;
            transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }

        .subscription-badge {
            background: #fff7ed;
            color: #c2410c;
            border: 1px solid #ffedd5;
            padding: 5px 15px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/" class="nav-brand">BizIntel <span class="text-primary">AI</span></a>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link-item">Dashboard</a>
            <a href="/analysis" class="nav-link-item">New Analysis</a>
            <a href="/reports" class="nav-link-item">Reports</a>
            <a href="/profile" class="nav-link-item active">Profile</a>
        </div>
        <div class="ms-auto">
            <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-4 fw-bold">Logout</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-circle">{{ user.name[0] if user.name else 'U' }}</div>
                <h3 class="fw-800 mb-1">{{ user.name }}</h3>
                <span class="subscription-badge"><i class="bi bi-patch-check-fill me-1"></i>PRO ANALYST</span>
            </div>

            <div class="p-5">
                <form action="/update-profile" method="POST">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" name="name" value="{{ user.name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                        </div>
                        
                        <div class="col-12 mt-4">
                            <label class="form-label">Current Industry Expertise</label>
                            <div class="mb-3">
                                {% for skill in user.expertise %}
                                    <span class="skill-tag">{{ skill }}</span>
                                {% endfor %}
                                <a href="#" class="text-primary small fw-bold ms-2 text-decoration-none">+ Edit Skills</a>
                            </div>
                        </div>

                        <hr class="my-4" style="opacity: 0.1;">

                        <div class="col-md-6">
                            <label class="form-label">New Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password">
                        </div>

                        <div class="col-12 text-end mt-5">
                            <a href="/dashboard" class="btn btn-light fw-bold px-4 py-2 me-2" style="border-radius: 12px;">Cancel</a>
                            <button type="submit" class="btn btn-primary btn-save">Save Profile Changes</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-4 p-4 border border-danger-subtle rounded-4 bg-danger-subtle bg-opacity-10 d-flex justify-content-between align-items-center">
            <div>
                <h6 class="fw-bold text-danger mb-0">Delete Account</h6>
                <p class="small text-muted mb-0">Permanently remove all your saved analyses and data.</p>
            </div>
            <a href="/logout" class="btn btn-outline-danger fw-bold rounded-pill px-4">Delete</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
