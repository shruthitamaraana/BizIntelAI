<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BizIntel AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .form-control { border-radius: 12px; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .btn-primary { border-radius: 12px; padding: 12px; font-weight: 700; background: #2563eb; border: none; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <h2 class="fw-800 mb-4">Create <span class="text-primary">Account</span></h2>
        <form action="/register" method="POST">
            <input type="text" name="name" class="form-control" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
            <button type="submit" class="btn btn-primary w-100">Join BizIntel AI</button>
            <p class="mt-3 small text-muted">Already have an account? <a href="/login" class="text-primary fw-bold text-decoration-none">Login</a></p>
        </form>
    </div>
</body>
</html>
